modLoader = "javafml"
loaderVersion = "[4,)"
license = "${license}"
issueTrackerURL = "https://github.com/your-name/moderntabs/issues"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
authors = "${mod_author}"
description = '''${mod_description}'''
logoFile='assets/moderntabs/icon.png'

[[mixins]]
config = "moderntabs-common.mixins.json"

[[mixins]]
config = "moderntabs-neoforge.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"